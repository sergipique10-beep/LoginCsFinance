name: cap-tick

# Cron externo horario que despierta al backend (Render free duerme) y captura
# el snapshot del índice de precio CS2 (cap-tick, upsert por ts — serie temporal
# por hora). Idempotente dentro de la misma hora, así que reintentos no duplican.
# Los rankings trending/movers viven en market-tick.yml (cada 15 min), no aquí.

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: POST /internal/cap-tick
        run: |
          curl -fsS -X POST "$BASE_URL/internal/cap-tick" -H "X-Cap-Token: $CAP_TICK_TOKEN"
        env:
          BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          CAP_TICK_TOKEN: ${{ secrets.CAP_TICK_TOKEN }}
